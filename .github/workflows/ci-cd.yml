name: CI/CD — Bibliothèque DIT

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:

  #  Job 1 : Tests et validation 
  test:
    name: Tests des services
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: bibliotheque_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installation des dépendances — Livres
        run: pip install -r services/livres/requirements.txt

      - name: Migrations — Livres
        env:
          DJANGO_SECRET_KEY: test-secret-key-ci
          DJANGO_DEBUG: "True"
          POSTGRES_DB: bibliotheque_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
        run: cd services/livres && python manage.py migrate --noinput

      - name: Installation des dépendances — Utilisateurs
        run: pip install -r services/utilisateurs/requirements.txt

      - name: Migrations — Utilisateurs
        env:
          DJANGO_SECRET_KEY: test-secret-key-ci
          DJANGO_DEBUG: "True"
          POSTGRES_DB: bibliotheque_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
        run: cd services/utilisateurs && python manage.py migrate --noinput

      - name: Installation des dépendances — Emprunts
        run: pip install -r services/emprunts/requirements.txt

      - name: Migrations — Emprunts
        env:
          DJANGO_SECRET_KEY: test-secret-key-ci
          DJANGO_DEBUG: "True"
          POSTGRES_DB: bibliotheque_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
        run: cd services/emprunts && python manage.py migrate --noinput

      - name: Installation des dépendances — Recommandation
        run: pip install -r services/recommandation/requirements.txt

      - name: Validation FastAPI
        run: cd services/recommandation && python -c "from app.main import app; print('FastAPI OK')"

      - name: Pipeline DVC
        run: |
          pip install dvc pandas scikit-learn scipy joblib numpy
          # Créer le fichier de données de test pour le CI
          mkdir -p dvc/data dvc/models
          cat > dvc/data/loans.csv << 'CSV'
          emprunt_id,utilisateur_id,livre_id,date_emprunt,date_retour_prevue,date_retour_effective,statut
          1,1,3,2024-01-10,2024-01-24,2024-01-22,retourne
          2,1,5,2024-02-01,2024-02-15,2024-02-14,retourne
          3,2,3,2024-01-15,2024-01-29,2024-01-28,retourne
          4,2,7,2024-02-10,2024-02-24,,en_cours
          5,3,1,2024-01-20,2024-02-03,2024-02-01,retourne
          6,3,3,2024-02-05,2024-02-19,,en_cours
          7,4,2,2024-01-05,2024-01-19,2024-01-18,retourne
          8,4,5,2024-02-12,2024-02-26,,en_cours
          9,5,1,2024-01-08,2024-01-22,2024-01-21,retourne
          10,5,4,2024-01-25,2024-02-08,2024-02-07,retourne
          CSV
          python dvc/scripts/preprocess.py
          python dvc/scripts/train.py
          python dvc/scripts/evaluate.py
          cat dvc/metrics.json

  #  Job 2 : Build des images Docker
  build:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build — Service Livres
        run: docker build -t bibliotheque-livres:latest ./services/livres

      - name: Build — Service Utilisateurs
        run: docker build -t bibliotheque-utilisateurs:latest ./services/utilisateurs

      - name: Build — Service Emprunts
        run: docker build -t bibliotheque-emprunts:latest ./services/emprunts

      - name: Build — Service Recommandation
        run: docker build -t bibliotheque-reco:latest ./services/recommandation

      - name: Build — Frontend
        run: docker build -t bibliotheque-frontend:latest ./services/frontend

      - name: Résumé
        run: |
          echo "Tous les services buildés avec succès"
          docker images | grep bibliotheque

  #  Job 3 : Vérification DVC 
  dvc-check:
    name: Vérification pipeline DVC
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installation DVC et dépendances ML
        run: pip install dvc pandas scikit-learn scipy joblib numpy

      - name: Exécution pipeline DVC
        run: |
          pip install dvc pandas scikit-learn scipy joblib numpy
          # Créer le fichier de données de test pour le CI
          mkdir -p dvc/data dvc/models
          cat > dvc/data/loans.csv << 'CSV'
          emprunt_id,utilisateur_id,livre_id,date_emprunt,date_retour_prevue,date_retour_effective,statut
          1,1,3,2024-01-10,2024-01-24,2024-01-22,retourne
          2,1,5,2024-02-01,2024-02-15,2024-02-14,retourne
          3,2,3,2024-01-15,2024-01-29,2024-01-28,retourne
          4,2,7,2024-02-10,2024-02-24,,en_cours
          5,3,1,2024-01-20,2024-02-03,2024-02-01,retourne
          6,3,3,2024-02-05,2024-02-19,,en_cours
          7,4,2,2024-01-05,2024-01-19,2024-01-18,retourne
          8,4,5,2024-02-12,2024-02-26,,en_cours
          9,5,1,2024-01-08,2024-01-22,2024-01-21,retourne
          10,5,4,2024-01-25,2024-02-08,2024-02-07,retourne
          CSV
          python dvc/scripts/preprocess.py
          python dvc/scripts/train.py
          python dvc/scripts/evaluate.py
          cat dvc/metrics.json

      - name: Affichage des métriques
        run: |
          echo "Métriques du modèle :"
          cat dvc/metrics.json

      - name: Upload métriques comme artifact
        uses: actions/upload-artifact@v4
        with:
          name: dvc-metrics
          path: dvc/metrics.json
