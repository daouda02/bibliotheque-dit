version: '3.9'

services:

  # ── Base de données PostgreSQL ──────────────────────────
  db:
    image: postgres:15-alpine
    container_name: bibliotheque-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bibliotheque_db}
      POSTGRES_USER: ${POSTGRES_USER:-sahra02}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      - "5432:5432"
    networks:
      - bibliotheque-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sahra02} -d ${POSTGRES_DB:-bibliotheque_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Service Livres ──────────────────────────────────────
  livres:
    build:
      context: ./services/livres
      dockerfile: Dockerfile
    container_name: bibliotheque-livres
    command: >
      sh -c "python manage.py migrate --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8001 --workers 2"
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-secret-key}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-True}
      POSTGRES_DB: ${DB_LIVRES:-db_livres}
      POSTGRES_USER: ${POSTGRES_USER:-sahra02}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    ports:
      - "8001:8001"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - bibliotheque-net
    volumes:
      - ./services/livres:/app
    profiles: ["dev"]
    restart: unless-stopped

  livres-prod:
    build:
      context: ./services/livres
      dockerfile: Dockerfile
    container_name: bibliotheque-livres
    command: >
      sh -c "python manage.py migrate --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8001 --workers 4"
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: "False"
      POSTGRES_DB: ${DB_LIVRES:-db_livres}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    ports:
      - "8001:8001"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - bibliotheque-net
    profiles: ["prod"]
    restart: unless-stopped

  # ── Service Utilisateurs ────────────────────────────────
  utilisateurs:
    build:
      context: ./services/utilisateurs
      dockerfile: Dockerfile
    container_name: bibliotheque-utilisateurs
    command: >
      sh -c "python manage.py migrate --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8002 --workers 2"
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-secret-key}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-True}
      POSTGRES_DB: ${DB_UTILISATEURS:-db_utilisateurs}
      POSTGRES_USER: ${POSTGRES_USER:-sahra02}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    ports:
      - "8002:8002"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - bibliotheque-net
    volumes:
      - ./services/utilisateurs:/app
    profiles: ["dev"]
    restart: unless-stopped

  utilisateurs-prod:
    build:
      context: ./services/utilisateurs
      dockerfile: Dockerfile
    container_name: bibliotheque-utilisateurs
    command: >
      sh -c "python manage.py migrate --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8002 --workers 4"
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: "False"
      POSTGRES_DB: ${DB_UTILISATEURS:-db_utilisateurs}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    ports:
      - "8002:8002"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - bibliotheque-net
    profiles: ["prod"]
    restart: unless-stopped

  # ── Service Emprunts ────────────────────────────────────
  emprunts:
    build:
      context: ./services/emprunts
      dockerfile: Dockerfile
    container_name: bibliotheque-emprunts
    command: >
      sh -c "python manage.py migrate --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8003 --workers 2"
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-secret-key}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-True}
      POSTGRES_DB: ${DB_EMPRUNTS:-db_emprunts}
      POSTGRES_USER: ${POSTGRES_USER:-sahra02}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      LIVRES_SERVICE_URL: http://livres:8001
      UTILISATEURS_SERVICE_URL: http://utilisateurs:8002
    ports:
      - "8003:8003"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - bibliotheque-net
    volumes:
      - ./services/emprunts:/app
    profiles: ["dev"]
    restart: unless-stopped

  emprunts-prod:
    build:
      context: ./services/emprunts
      dockerfile: Dockerfile
    container_name: bibliotheque-emprunts
    command: >
      sh -c "python manage.py migrate --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8003 --workers 4"
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: "False"
      POSTGRES_DB: ${DB_EMPRUNTS:-db_emprunts}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      LIVRES_SERVICE_URL: http://livres-prod:8001
      UTILISATEURS_SERVICE_URL: http://utilisateurs-prod:8002
    ports:
      - "8003:8003"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - bibliotheque-net
    profiles: ["prod"]
    restart: unless-stopped

  # ── Service Recommandation ──────────────────────────────
  recommandation:
    build:
      context: ./services/recommandation
      dockerfile: Dockerfile
    container_name: bibliotheque-reco
    command: uvicorn app.main:app --host 0.0.0.0 --port 8004 --reload
    environment:
      MODEL_PATH: /app/model_artifacts/model.pkl
      DATA_PATH: /app/model_artifacts/loans.csv
    ports:
      - "8004:8004"
    volumes:
      - model_data:/app/model_artifacts
    networks:
      - bibliotheque-net
    profiles: ["dev", "prod"]
    restart: unless-stopped

  # ── Frontend ────────────────────────────────────────────
  frontend:
    build:
      context: ./services/frontend
      dockerfile: Dockerfile
    container_name: bibliotheque-frontend
    ports:
      - "80:80"
    depends_on:
      - livres
      - utilisateurs
      - emprunts
      - recommandation
    networks:
      - bibliotheque-net
    profiles: ["dev"]
    restart: unless-stopped

  frontend-prod:
    build:
      context: ./services/frontend
      dockerfile: Dockerfile
    container_name: bibliotheque-frontend
    ports:
      - "80:80"
    networks:
      - bibliotheque-net
    profiles: ["prod"]
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  model_data:
    driver: local

networks:
  bibliotheque-net:
    driver: bridge
